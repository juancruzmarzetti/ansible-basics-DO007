---
- name: Basic System Setup
  hosts: web
  become: true
  vars:
    user_name: 'roger'
    package_state: 'latest'
    security_only: true
  tasks:
    - name: Update all security-related packages
      ansible.builtin.package:
        name: '*'
        state: "{{ pachage_state }}"
        security: "{{ security_only }}"

    - name: Create a new user
      ansible.builtin.user:
        name: "{{ username }}"
        state: present
        create_home: true